<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mein Radel-Wetter</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&display=swap');

    :root {
      --blue-deep:  #0a2540;
      --blue-mid:   #1565C0;
      --blue-light: #E3F2FD;
      --blue-pale:  #F0F7FF;
      --text-main:  #0a2540;
      --text-muted: #5a7080;
      --text-faint: #9ab0be;
      --border:     rgba(10,37,64,0.1);
      --card-bg:    #ffffff;
      --page-bg:    #f4f8fc;
      --gear-on-bg: #deeefb;
      --gear-on-fg: #0d47a1;
      --gear-off-bg:#eef3f7;
      --gear-off-fg:#9ab0be;
      --radius-lg:  16px;
      --radius-md:  10px;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'DM Sans', -apple-system, BlinkMacSystemFont, 'Helvetica Neue', sans-serif;
      background: var(--page-bg);
      color: var(--text-main);
      min-height: 100vh;
      padding: 0 0 3rem;
      -webkit-text-size-adjust: 100%;
    }

    /* в”Җв”Җ Header в”Җв”Җ */
    .hero {
      background: var(--blue-deep);
      padding: 2rem 1.25rem 2.5rem;
      text-align: center;
      position: relative;
      overflow: hidden;
    }
    .hero::before {
      content: '';
      position: absolute;
      width: 340px; height: 340px;
      background: radial-gradient(circle, rgba(21,101,192,0.35) 0%, transparent 70%);
      top: -80px; left: 50%; -webkit-transform: translateX(-50%); transform: translateX(-50%);
      pointer-events: none;
    }
    .hero-location {
      font-family: 'DM Sans', -apple-system, BlinkMacSystemFont, 'Helvetica Neue', sans-serif;
      font-weight: 400;
      font-size: 26px;
      color: #fff;
      letter-spacing: 0.5px;
      position: relative;
    }
    .hero-sub {
      font-size: 13px;
      color: rgba(255,255,255,0.5);
      margin-top: 4px;
      letter-spacing: 0.5px;
      position: relative;
    }
    .hero-coords {
      display: inline-block;
      margin-top: 12px;
      font-size: 11px;
      color: rgba(255,255,255,0.35);
      background: rgba(255,255,255,0.07);
      border-radius: 20px;
      padding: 4px 12px;
      position: relative;
    }

    /* в”Җв”Җ Container в”Җв”Җ */
    .container {
      max-width: 480px;
      margin: 0 auto;
      padding: 0 1rem;
    }

    /* в”Җв”Җ Toolbar в”Җв”Җ */
    .toolbar {
      display: -webkit-flex;
      display: flex;
      -webkit-align-items: center;
      align-items: center;
      -webkit-justify-content: space-between;
      justify-content: space-between;
      margin: 1.25rem 0 1rem;
      gap: 8px;
    }
    .section-title {
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 1px;
      text-transform: uppercase;
      color: var(--text-faint);
      white-space: nowrap;
    }
    .btn-group {
      display: -webkit-flex;
      display: flex;
      gap: 6px;
      -webkit-align-items: center;
      align-items: center;
    }

    /* в”Җв”Җ Buttons в”Җв”Җ */
    .btn {
      display: -webkit-inline-flex;
      display: inline-flex;
      -webkit-align-items: center;
      align-items: center;
      gap: 4px;
      border-radius: 20px;
      padding: 6px 13px;
      font-size: 12px;
      font-family: 'DM Sans', -apple-system, BlinkMacSystemFont, 'Helvetica Neue', sans-serif;
      font-weight: 500;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      white-space: nowrap;
      border: none;
      outline: none;
      -webkit-appearance: none;
      appearance: none;
      transition: background 0.15s, color 0.15s;
    }
    .btn:disabled { opacity: 0.4; cursor: not-allowed; }

    .btn-ghost {
      background: none;
      border: 1px solid var(--border);
      color: var(--text-muted);
    }
    .btn-ghost:active { background: #cce5fb; }

    .btn-tomorrow {
      background: var(--gear-off-bg);
      border: 1px solid transparent;
      color: var(--text-faint);
    }
    .btn-tomorrow:active { background: var(--gear-on-bg); }
    .btn-tomorrow.is-active {
      background: var(--gear-on-bg);
      border-color: rgba(13,71,161,0.22);
      color: var(--gear-on-fg);
    }

    /* в”Җв”Җ Spinner в”Җв”Җ */
    .spinner {
      display: -webkit-flex;
      display: flex;
      -webkit-align-items: center;
      align-items: center;
      -webkit-justify-content: center;
      justify-content: center;
      gap: 10px;
      padding: 2.5rem;
      color: var(--text-muted);
      font-size: 14px;
    }
    .spin {
      width: 20px; height: 20px;
      border: 2px solid var(--blue-light);
      border-top-color: var(--blue-mid);
      border-radius: 50%;
      -webkit-animation: spin 0.8s linear infinite;
      animation: spin 0.8s linear infinite;
      -webkit-flex-shrink: 0;
      flex-shrink: 0;
    }
    @-webkit-keyframes spin { to { -webkit-transform: rotate(360deg); } }
    @keyframes spin          { to { transform: rotate(360deg); } }

    /* в”Җв”Җ Error в”Җв”Җ */
    .error-box {
      background: #fff3f3;
      border: 1px solid #f09595;
      border-radius: var(--radius-md);
      padding: 1rem 1.25rem;
      color: #791F1F;
      font-size: 13px;
      line-height: 1.5;
    }

    /* в”Җв”Җ Day card в”Җв”Җ */
    .day-card {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 1.1rem 1.25rem;
      margin-bottom: 1rem;
      box-shadow: 0 1px 4px rgba(10,37,64,0.05);
      -webkit-animation: fadeUp 0.3s ease both;
      animation: fadeUp 0.3s ease both;
    }
    @-webkit-keyframes fadeUp {
      from { opacity: 0; -webkit-transform: translateY(8px); }
      to   { opacity: 1; -webkit-transform: translateY(0); }
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .day-header {
      display: -webkit-flex;
      display: flex;
      -webkit-align-items: baseline;
      align-items: baseline;
      -webkit-justify-content: space-between;
      justify-content: space-between;
      margin-bottom: 12px;
    }
    .day-label {
      font-weight: 600;
      font-size: 20px;
      color: var(--text-main);
    }
    .day-date {
      font-size: 12px;
      color: var(--text-faint);
    }

    /* в”Җв”Җ Gear grid в”Җв”Җ */
    .gear-grid {
      display: -webkit-flex;
      display: flex;
      gap: 7px;
      margin-bottom: 16px;
    }
    .gear-tile {
      display: -webkit-flex;
      display: flex;
      -webkit-flex-direction: column;
      flex-direction: column;
      -webkit-align-items: center;
      align-items: center;
      -webkit-justify-content: center;
      justify-content: center;
      gap: 5px;
      border-radius: var(--radius-md);
      padding: 11px 4px 9px;
      -webkit-flex: 1;
      flex: 1;
    }
    .gear-tile-on {
      background: var(--gear-on-bg);
      border: 1.5px solid rgba(13,71,161,0.18);
      box-shadow: 0 2px 8px rgba(13,71,161,0.10);
    }
    .gear-tile-off {
      background: var(--gear-off-bg);
      border: 1.5px solid transparent;
      opacity: 0.38;
    }
    .gear-tile-icon {
      font-size: 28px;
      line-height: 1;
    }
    .gear-tile-off .gear-tile-icon {
      -webkit-filter: grayscale(1) opacity(0.5);
      filter: grayscale(1) opacity(0.5);
    }
    .gear-tile-label {
      font-size: 9px;
      font-weight: 600;
      letter-spacing: 0.2px;
      text-align: center;
      line-height: 1.2;
    }
    .gear-tile-on  .gear-tile-label { color: var(--gear-on-fg); }
    .gear-tile-off .gear-tile-label { color: var(--gear-off-fg); }

    /* в”Җв”Җ Time slots в”Җв”Җ */
    .times-grid {
      display: -webkit-flex;
      display: flex;
      gap: 8px;
    }
    .time-block {
      background: var(--blue-pale);
      border-radius: var(--radius-md);
      padding: 10px 6px 8px;
      text-align: center;
      -webkit-flex: 1;
      flex: 1;
    }
    .time-label {
      font-size: 10px;
      color: var(--text-faint);
      margin-bottom: 5px;
      letter-spacing: 0.3px;
      text-transform: uppercase;
      font-weight: 500;
    }
    .time-icon {
      font-size: 20px;
      line-height: 1;
      margin-bottom: 4px;
      display: block;
    }
    .time-temp {
      font-weight: 700;
      font-size: 17px;
      color: var(--text-main);
    }
    .time-desc  { font-size: 10px; color: var(--text-muted); margin-top: 3px; line-height: 1.3; }
    .time-wind  { font-size: 10px; color: var(--text-faint); margin-top: 2px; }
    .time-rain  { font-size: 10px; color: var(--blue-mid); margin-top: 2px; font-weight: 500; }

    /* в”Җв”Җ Tomorrow card hidden by default в”Җв”Җ */
    #tomorrow-card { display: none; }
    #tomorrow-card.visible {
      display: block;
      -webkit-animation: fadeUp 0.25s ease both;
      animation: fadeUp 0.25s ease both;
    }

    /* в”Җв”Җ Meta в”Җв”Җ */
    .meta {
      text-align: center;
      font-size: 11px;
      color: var(--text-faint);
      margin-top: 0.5rem;
      line-height: 1.8;
    }
    .meta a { color: var(--blue-mid); text-decoration: none; }
  </style>
</head>
<body>

  <div class="hero">
    <div class="hero-location">рҹҡҙ<br>Mein Radelwetter</div>
    <div class="hero-sub">Tettnang - Friedrichshafen - Tettnang</div>
    <div class="hero-coords">47.67В°N &nbsp;9.59В°E</div>
  </div>

  <div class="container">

    <div class="toolbar">
      <span class="section-title">Vorhersage</span>
      <div class="btn-group">
        <button class="btn btn-tomorrow" id="tomorrowBtn" onclick="toggleTomorrow()" disabled>
          рҹ“… Morgen
        </button>
        <button class="btn btn-ghost" id="refreshBtn" onclick="loadWeather()">
          вҶ» Aktualisieren
        </button>
      </div>
    </div>

    <div id="status"></div>
    <div id="today-card"></div>
    <div id="tomorrow-card"></div>

    <div class="meta">
      Daten: <a href="https://open-meteo.com" target="_blank">open-meteo.com</a>
    </div>

  </div>

  <script>
    var tomorrowVisible = false;

    function toggleTomorrow() {
      tomorrowVisible = !tomorrowVisible;
      var card = document.getElementById('tomorrow-card');
      var btn  = document.getElementById('tomorrowBtn');
      if (tomorrowVisible) {
        card.className = 'visible';
        btn.className  = 'btn btn-tomorrow is-active';
        btn.textContent = 'вң• Morgen';
      } else {
        card.className = '';
        btn.className  = 'btn btn-tomorrow';
        btn.textContent = 'рҹ“… Morgen';
      }
    }

    var LAT = 47.67, LON = 9.59;

    var WMO = {
      0:  ['Klar',                 'вҳҖ'],
      1:  ['Гңberwiegend klar',     'рҹҢӨ'],
      2:  ['Teilweise bewГ¶lkt',    'вӣ…'],
      3:  ['Bedeckt',              'вҳҒ'],
      45: ['Nebel',                'рҹҢ«'],
      48: ['Reifnebel',            'рҹҢ«'],
      51: ['Leichter Nieselregen', 'рҹҢҰ'],
      53: ['Nieselregen',          'рҹҢҰ'],
      55: ['Starker Nieselregen',  'рҹҢ§'],
      61: ['Leichter Regen',       'рҹҢ§'],
      63: ['Regen',                'рҹҢ§'],
      65: ['Starker Regen',        'рҹҢ§'],
      71: ['Leichter Schneefall',  'вқ„'],
      73: ['Schneefall',           'вқ„'],
      75: ['Starker Schneefall',   'вқ„'],
      77: ['SchneekГ¶rner',         'рҹҢЁ'],
      80: ['Leichte Schauer',      'рҹҢҰ'],
      81: ['Regenschauer',         'рҹҢ§'],
      82: ['Starke Regenschauer',  'рҹҢ§'],
      85: ['Schneeschauer',        'рҹҢЁ'],
      86: ['Starke Schneeschauer', 'рҹҢЁ'],
      95: ['Gewitter',             'вӣҲ'],
      96: ['Gewitter mit Hagel',   'вӣҲ'],
      99: ['Starkes Gewitter',     'вӣҲ']
    };

    var RAIN_CODES = [51,53,55,61,63,65,71,73,75,77,80,81,82,85,86,95,96,99];

    function wmoInfo(c)  { return WMO[c] || ['Unbekannt','рҹҢЎ']; }
    function isRain(c)   { return RAIN_CODES.indexOf(c) !== -1; }
    function avg(arr)    { return Math.round(arr.reduce(function(a,b){return a+b;},0)/arr.length); }

    function dominantCode(codes) {
      var c = {};
      for (var i=0;i<codes.length;i++) c[codes[i]] = (c[codes[i]]||0)+1;
      var best = codes[0];
      for (var k in c) { if (c[k] > (c[best]||0)) best = k; }
      return +best;
    }

    function slotData(allTimes, hourly, targetHours) {
      var idx = [];
      for (var j=0;j<targetHours.length;j++) {
        var i = allTimes.indexOf(targetHours[j]);
        if (i !== -1) idx.push(i);
      }
      if (!idx.length) return null;
      var temps  = idx.map(function(i){return Math.round(hourly.temperature_2m[i]);});
      var winds  = idx.map(function(i){return Math.round(hourly.windspeed_10m[i]);});
      var codes  = idx.map(function(i){return hourly.weathercode[i];});
      var precip = 0;
      for (var n=0;n<idx.length;n++) precip += (hourly.precipitation[idx[n]]||0);
      var code = dominantCode(codes);
      var info = wmoInfo(code);
      var radSum = 0;
      for (var m=0;m<idx.length;m++) radSum += (hourly.shortwave_radiation ? (hourly.shortwave_radiation[idx[m]]||0) : 0);
      return {
        temp:      avg(temps),
        wind:      avg(winds),
        desc:      info[0],
        icon:      info[1],
        rain:      (function(){for(var x=0;x<codes.length;x++){if(isRain(codes[x]))return true;}return false;})(),
        precip:    Math.round(precip*10)/10,
        radiation: radSum/idx.length
      };
    }

    function formatDate(ds) {
      return new Date(ds+'T12:00:00')
        .toLocaleDateString('de-DE',{weekday:'long',day:'2-digit',month:'2-digit',year:'numeric'});
    }

    function renderDay(label, dateStr, morning, midday, evening, morningTemp, rainDay) {
      var needsJacket = morningTemp < 15;
      var needsGloves = morningTemp < 7;
      var needsLight  = morning && morning.radiation < 30;
      var needsWind   = [morning,midday,evening].filter(Boolean).some(function(s){return s.wind>40;});

      var gear = [
        {icon:'рҹҢӮ', label:'Regen&shy;kleidung', on: rainDay},
        {icon:'рҹ§Ҙ', label:'Jacke',              on: needsJacket},
        {icon:'рҹ§Ө', label:'Handschuhe',         on: needsGloves},
        {icon:'рҹ”Ұ', label:'Rad&shy;licht',      on: needsLight},
        {icon:'рҹҢӘ', label:'Starker Wind',       on: needsWind}
      ];

      var slots = [
        {label:'Morgen', data:morning},
        {label:'Mittag', data:midday},
        {label:'Abend',  data:evening}
      ];

      var gH = '';
      for (var i=0;i<gear.length;i++) {
        var g = gear[i];
        gH += '<div class="gear-tile '+(g.on?'gear-tile-on':'gear-tile-off')+'">' +
              '<span class="gear-tile-icon">'+g.icon+'</span>' +
              '<span class="gear-tile-label">'+g.label+'</span></div>';
      }

      var sH = '';
      for (var j=0;j<slots.length;j++) {
        var s = slots[j];
        sH += '<div class="time-block">' +
              '<div class="time-label">'+s.label+'</div>' +
              '<div class="time-icon">'+(s.data?s.data.icon:'вҖ“')+'</div>' +
              '<div class="time-temp">'+(s.data?s.data.temp+'В°':'вҖ“')+'</div>' +
              '<div class="time-desc">'+(s.data?s.data.desc:'')+'</div>' +
              '<div class="time-wind">'+(s.data?'рҹ’Ё '+s.data.wind+' km/h':'')+'</div>' +
              (s.data&&s.data.precip>0?'<div class="time-rain">рҹ’§ '+s.data.precip+' mm</div>':'')+
              '</div>';
      }

      return '<div class="day-card">' +
        '<div class="day-header">' +
        '<span class="day-label">'+label+'</span>' +
        '<span class="day-date">'+formatDate(dateStr)+'</span></div>' +
        '<div class="gear-grid">'+gH+'</div>' +
        '<div class="times-grid">'+sH+'</div></div>';
    }

    function loadWeather() {
      var refreshBtn = document.getElementById('refreshBtn');
      var tomorrowBtn = document.getElementById('tomorrowBtn');
      var status  = document.getElementById('status');
      var todayEl = document.getElementById('today-card');
      var tmrwEl  = document.getElementById('tomorrow-card');

      // Reset tomorrow toggle on refresh
      tomorrowVisible = false;
      tmrwEl.className = '';
      tomorrowBtn.className = 'btn btn-tomorrow';
      tomorrowBtn.textContent = 'рҹ“… Morgen';
      tomorrowBtn.disabled = true;

      refreshBtn.disabled = true;
      status.innerHTML = '<div class="spinner"><div class="spin"></div> Wetterdaten werden abgerufenвҖҰ</div>';
      todayEl.innerHTML = '';
      tmrwEl.innerHTML  = '';

      var url = 'https://api.open-meteo.com/v1/forecast' +
        '?latitude='+LAT+'&longitude='+LON +
        '&hourly=temperature_2m,weathercode,windspeed_10m,precipitation,shortwave_radiation' +
        '&forecast_days=2&timezone=Europe%2FBerlin';

      fetch(url)
        .then(function(res) {
          if (!res.ok) throw new Error('API-Fehler ' + res.status);
          return res.json();
        })
        .then(function(d) {
          var times    = d.hourly.time;
          var today    = times[0].slice(0,10);
          var tomorrow = (times[24]||'').slice(0,10);

          function buildDay(prefix) {
            function hh(h){ return prefix+'T'+(h<10?'0':'')+h+':00'; }
            var morning = slotData(times,d.hourly,[hh(7),hh(8),hh(9)]);
            var midday  = slotData(times,d.hourly,[hh(12),hh(13)]);
            var evening = slotData(times,d.hourly,[hh(18),hh(19),hh(20)]);
            var allIdx  = [];
            for (var i=0;i<times.length;i++) { if (times[i].slice(0,10)===prefix) allIdx.push(i); }
            var rainDay = false;
            for (var k=0;k<allIdx.length;k++) { if(isRain(d.hourly.weathercode[allIdx[k]])){rainDay=true;break;} }
            return {morning:morning,midday:midday,evening:evening,rainDay:rainDay,morningTemp:morning?morning.temp:99};
          }

          var t  = buildDay(today);
          var tm = tomorrow ? buildDay(tomorrow) : null;

          var now = new Date().toLocaleTimeString('de-DE',{hour:'2-digit',minute:'2-digit'});
          status.innerHTML = '<div style="text-align:center;font-size:11px;color:var(--text-faint);margin-bottom:.75rem">Aktualisiert: '+now+' Uhr</div>';

          todayEl.innerHTML = renderDay('Heute', today, t.morning, t.midday, t.evening, t.morningTemp, t.rainDay);

          if (tm) {
            tmrwEl.innerHTML = renderDay('Morgen', tomorrow, tm.morning, tm.midday, tm.evening, tm.morningTemp, tm.rainDay);
            tomorrowBtn.disabled = false;
          }
        })
        .catch(function(err) {
          status.innerHTML  = '';
          todayEl.innerHTML = '<div class="error-box"><strong>Fehler:</strong> '+err.message+'<br>Bitte Internetverbindung prГјfen und erneut versuchen.</div>';
        })
        .then(function() {
          refreshBtn.disabled = false;
        });
    }

    loadWeather();
  </script>
</body>
</html>
